    <!-- 
    forms
    div and span
    semantic 

   form are used to collect information from the user and allowing to submit to the server
   login pages,register page, signup , contact form

   form -it is used to define a structure for form fields

   input
   it is used to create a form field

   label
   to provide extra information about a field

   attributes
   type----it controls the form field
   placeholder---it gives the hint to the user
   for and id --to form the relation between lable and input
   name---it carries data to the server and also it provides the key

   value--it is used to pass a pre defined value

   


    
    -->
   <form action="" method="post">
    <label for="user">Full Name</label> <br>
    <input type="text" id="user" placeholder="Enter Your Full Name"  name="username" > 
    <br>
    <br>

    <label for="u">Email address</label> <br>
    <input type="email" id="u" placeholder="Enter Your Email" >
    <br>

    
    <label for="">Password</label> <br>
    <input type="password" placeholder="Create a password">
    <br>

    <label for="">Confirm Password</label> <br>
    <input type="password" placeholder="Confirm your password">
    <br>

    <label for="">Gender</label><br>
    <input type="radio" name="gender" value="male" id="m">
    <label for="m">Male</label>
    <input type="radio" name="gender" value="female" id="fm">
    <label for="fm">female</label>
    <input type="radio" name="gender" value="other" id="o">
    <label for="o">other</label>

    <br>
    <label for="">Date of Birth</label> <br>
    <input type="date">

    <br>
    <label for="">Country</label><br>
    <select name="country" id="">
        <option value="india">india</option>
        <option value="uk">uk</option>
        <option value="usa">usa</option>
        <option value="aust">australia</option>
    </select>


    <label for="">choose your skills</label> <br>
    <input type="checkbox" value="html" name="skill">
    <label for="">html</label>
    <input type="checkbox" value="css" name="skill">
    <label for="">css</label>
    <input type="checkbox" value="js" name="skill">
    <label for="">js</label>

    <br>

    <label for="">please write your feedback</label> <br>
    <textarea name="" id="" cols="30" rows="10" placeholder="enter your feedback"></textarea>
    <br>
        <input type="checkbox" required>
    <label for="">I agree to the terms of services and privacy policy</label>
    <br>
    <button type="submit">submit</button>
    <button type="reset">reset</button>
</form>
