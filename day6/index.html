<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }
        header{
            background:rgba(17, 15, 15, 0.866);
            color:white;
            padding:20px 40px;
            display:flex;
            align-items:center;
            justify-content: space-between;
        }
        header>ul{
            display:flex;
            gap:20px;
            list-style-type: none;
        }

        .s1{
            background:rgba(17, 15, 15, 0.866);
            color:white;
            padding:20px 40px;
            display:flex;
            align-items:center;
        }
        .s1>div{
            flex-basis:50%;
        }
        img{
            width:100%;
            height:100%;
        }
        .btn1{
            background:green;
            padding:7px;   
        }
        .btn2{
            border: 1px solid green;
            padding:7px;    
            background:transparent;
            color:white; 

        }
    </style>
</head>
<body>
    <header>
        <h1><span>BT</span>Triveni</h1>
        <ul>
            <li>About</li>
            <li>Achievement</li>
            <li>Education   </li>
            <li>Projects</li>
            <li>Contacts</li>
        </ul>
    </header>
  
    <section class="s1">
        <div>
            <h1>Hi, I'm <span style="color:green;">Triveni</span> </h1>
            <h3 style="padding:10px 2px ">I build simple and clean websites.</h3>
            <p  style="padding:10px 2px ">I am a web development student who loves turning ideas into real, working web pages.</p>
            <button class="btn1">view projects</button>
            <button class="btn2">Download cv</button>
        </div>
        <div>
            <img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085" alt="">
        </div>
    </section>
</body>
</html>
