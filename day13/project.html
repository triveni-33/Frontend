let emailpattern=/[A-Za-z0-9._]+@[a-z]+\.[a-z]{3}/

let passwordpattern=/^(?=.*[A-Z])(?=.*[a-z])(?=.*[0-9])(?=.*[@#$%^&*]).{8}/
