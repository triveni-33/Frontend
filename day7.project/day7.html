<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            background:lightcoral;
            margin:20px;
            width:200px;
            height:100px;
            transition:all 2s;
        }
        .child1:hover{
            background:green;
            width:300px;
            transform:translate(-40px,-10px);
        }
        .child2:hover{
            border:2px dotted black;
            transform:scale(2)
        }
        .child3:hover{
            height:200px;
            transform:rotate(-20deg)
        }
        
    </style>
</head>
<body>
    <div class="child1">content</div>
    <div class="child2">content</div>
    <div class="child3">content</div>
</body>
</html>
